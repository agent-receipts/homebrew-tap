name: brew audit

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: catches upstream issues (e.g. homepage 404, URL rot) even
    # when no formula changes have landed.
    - cron: "0 12 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Audit formulae
        run: |
          shopt -s nullglob
          formulae=(Formula/*.rb)
          if [ ${#formulae[@]} -eq 0 ]; then
            echo "No formulae to audit; skipping."
            exit 0
          fi

          # Symlink the checked-out repo into Homebrew's taps directory
          # so formulae resolve by `<owner>/<tap>/<name>` — required for
          # --strict audits, which check tap-relative conventions.
          taps_dir="$(brew --repo)/Library/Taps/agent-receipts"
          mkdir -p "$taps_dir"
          ln -sf "$GITHUB_WORKSPACE" "$taps_dir/homebrew-tap"

          status=0
          for f in "${formulae[@]}"; do
            name=$(basename "$f" .rb)
            echo "::group::brew audit agent-receipts/tap/$name"
            if ! brew audit --strict --online "agent-receipts/tap/$name"; then
              status=1
            fi
            echo "::endgroup::"
          done
          exit "$status"
